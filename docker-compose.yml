services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chinamenu
      POSTGRES_PASSWORD: chinamenu
      POSTGRES_DB: chinamenu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chinamenu -d chinamenu"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        VITE_BOT_TOKEN: ${VITE_BOT_TOKEN}
        VITE_ADMIN_CHAT_ID: ${VITE_ADMIN_CHAT_ID}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      POSTGRES_URL: postgres://chinamenu:chinamenu@postgres:5432/chinamenu
      VITE_BOT_TOKEN: ${VITE_BOT_TOKEN}
      VITE_ADMIN_CHAT_ID: ${VITE_ADMIN_CHAT_ID}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID}
      WEBAPP_URL: ${WEBAPP_URL:-https://china-menu.vercel.app/}
    ports:
      - "3000:3000"

  # Telegram-бот (NestJS, TypeScript) — webhook для заказов
  telegram-bot:
    build:
      context: ./services/telegram-bot
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${VITE_BOT_TOKEN}
      ADMIN_CHAT_ID: ${VITE_ADMIN_CHAT_ID}
      WEBAPP_URL: ${WEBAPP_URL:-https://china-menu.vercel.app/}
      WEBHOOK_DOMAIN: ${BOT_WEBHOOK_DOMAIN:-}
      PORT: 3001
    ports:
      - "3001:3001"

  # Cloudflare Tunnel — если DuckDNS не резолвится у Telegram, используй этот URL для webhook.
  # Запусти: docker compose up -d cloudflared
  # В логах появится URL вида https://xxx.trycloudflare.com — скопируй в BOT_WEBHOOK_DOMAIN и перезапусти бота.
  # URL меняется при перезапуске cloudflared.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://telegram-bot:3001
    depends_on:
      - telegram-bot

  # Caddy — reverse proxy с автоматическим HTTPS (Let's Encrypt)
  # Раскомментируй, если хочешь SSL на этом сервере. Нужен домен и порты 80/443.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - app
      - telegram-bot

volumes:
  postgres_data:
  caddy_data:
